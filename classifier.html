<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalletBiz Product Classifier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F4F1EC;
    --surface:   #FFFFFF;
    --text:      #1C1B18;
    --muted:     #6B6860;
    --border:    #DEDAD3;
    --accent:    #2C5F2E;
    --accent2:   #3A5A7C;
    --radius:    10px;
    --font:      'DM Sans', sans-serif;
    --mono:      'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 13px; font-weight: 500;
    color: #fff; letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .header-subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .stat-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px; font-weight: 500;
    color: var(--muted);
    font-family: var(--mono);
  }
  .stat-pill span { color: var(--text); font-weight: 600; }
  .nav-link {
    font-size: 12px; color: var(--accent2);
    text-decoration: none; font-weight: 500;
    font-family: var(--mono);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--bg);
    transition: border-color .15s, color .15s;
  }
  .nav-link:hover { border-color: var(--accent2); color: var(--text); }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 64px;
  }

  .classifier-wrap {
    width: 100%;
    max-width: 560px;
  }

  .intro {
    margin-bottom: 28px;
    text-align: center;
  }
  .intro h1 {
    font-size: 22px; font-weight: 600; letter-spacing: -0.4px;
    margin-bottom: 6px;
  }
  .intro p {
    font-size: 13px; color: var(--muted); line-height: 1.6;
  }

  /* ── Combobox ── */
  .combo {
    position: relative;
  }

  .combo-input-wrap {
    position: relative;
  }

  .combo-input-wrap svg.ico {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: var(--muted); fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none; flex-shrink: 0;
  }

  #search {
    width: 100%;
    padding: 11px 40px 11px 38px;
    font-family: var(--font);
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(44,95,46,0.10);
  }
  #search::placeholder { color: var(--muted); }

  .clear-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 15px;
    width: 22px; height: 22px;
    display: none; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: background .12s, color .12s;
  }
  .clear-btn:hover { background: var(--bg); color: var(--text); }
  .clear-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

  /* ── Dropdown ── */
  #dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 8px 28px rgba(0,0,0,0.10);
    z-index: 50;
    overflow: hidden;
    display: none;
    max-height: 380px;
    overflow-y: auto;
  }
  #dropdown.open { display: block; }

  .dd-meta {
    padding: 8px 12px 6px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.3px;
  }

  .dd-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    transition: background .1s;
    border-bottom: 1px solid var(--border);
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover, .dd-item.active {
    background: var(--bg);
  }

  .dd-dot {
    width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
  }

  .dd-body { flex: 1; min-width: 0; }
  .dd-name {
    font-size: 13px; font-weight: 500;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dd-name mark {
    background: rgba(44,95,46,0.15);
    color: var(--text);
    border-radius: 2px;
    padding: 0 1px;
    font-weight: 600;
  }
  .dd-path {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--muted);
    font-family: var(--mono);
    margin-top: 2px;
  }
  .dd-path .sep { color: var(--border); }

  .dd-pill {
    padding: 1px 6px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
  }

  .dd-no-results {
    padding: 20px 12px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Result card ── */
  #result-card {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
  }
  #result-card.visible { display: block; }

  .rc-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .rc-color-bar {
    width: 4px; height: 40px; border-radius: 2px; flex-shrink: 0;
  }
  .rc-title { font-size: 15px; font-weight: 600; }
  .rc-tag {
    margin-left: auto;
    font-size: 10px; font-weight: 500;
    padding: 3px 8px; border-radius: 20px;
    font-family: var(--mono);
  }

  .rc-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  .rc-field {
    background: var(--surface);
    padding: 12px 16px;
  }
  .rc-label {
    font-size: 10px; font-weight: 500;
    color: var(--muted); font-family: var(--mono);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .rc-value {
    font-size: 13px; font-weight: 500; color: var(--text);
  }
  .rc-value .mat-swatch {
    display: inline-block;
    width: 9px; height: 9px; border-radius: 2px;
    margin-right: 5px; vertical-align: middle;
    position: relative; top: -1px;
  }

  /* ── Empty state ── */
  .empty-state {
    margin-top: 40px;
    text-align: center;
    color: var(--muted);
  }
  .empty-state .icon-wrap {
    width: 52px; height: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }
  .empty-state svg { width: 22px; height: 22px; stroke: var(--muted); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .empty-state p { font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">PB</div>
    <div>
      <div class="header-title">Product Classifier</div>
      <div class="header-subtitle">Find the material & category for any product</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-pill">Products <span>64</span></div>
    <a href="index.html" class="nav-link">← Treemap</a>
  </div>
</header>

<main>
  <div class="classifier-wrap">

    <div class="intro">
      <h1>Product lookup</h1>
      <p>Type a product name to identify its material and category classification.</p>
    </div>

    <div class="combo" id="combo">
      <div class="combo-input-wrap">
        <svg class="ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="e.g. Plywood boards, Steel pallets…" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="dropdown" aria-autocomplete="list">
        <button class="clear-btn" id="clear-btn" aria-label="Clear search" tabindex="-1">
          <svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
        </button>
      </div>
      <div id="dropdown" role="listbox"></div>
    </div>

    <div id="result-card" aria-live="polite"></div>

    <div class="empty-state" id="empty-state">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="12"/></svg>
      </div>
      <p>Search for a product above<br>to see its classification.</p>
    </div>

  </div>
</main>

<script>
const PALETTE = {
  Wood:      { base: '#3D6B4F', light: 'rgba(61,107,79,0.13)',  text: '#2F5540' },
  Metal:     { base: '#2E4E72', light: 'rgba(46,78,114,0.13)',  text: '#223D5E' },
  Plastic:   { base: '#6B3D8A', light: 'rgba(107,61,138,0.13)', text: '#572E72' },
  Cardboard: { base: '#8A5C1E', light: 'rgba(138,92,30,0.13)',  text: '#714A14' },
  Paper:     { base: '#7A4040', light: 'rgba(122,64,64,0.13)',   text: '#623030' },
};

const raw = [
  ['Cardboard','Packing accessories','Cardboard blanks'],
  ['Cardboard','Packing accessories','Cardboard boxes'],
  ['Cardboard','Packing accessories','Cardboard lids'],
  ['Cardboard','Packing accessories','Slip-lid cardboard boxes'],
  ['Metal','Handling / Pallet accessories','Distancers'],
  ['Metal','Load carriers','Foldable gitterboxes'],
  ['Metal','Load carriers','Solid pallet boxes'],
  ['Metal','Packing accessories','Straps'],
  ['Metal','Pallets','Steel pallets'],
  ['Metal','Production materials','EPAL nails'],
  ['Metal','Production materials','Loose nails'],
  ['Metal','Production materials','Standard nails'],
  ['Metal','Racking products','Manual racking'],
  ['Metal','Racking products','Mobilracks'],
  ['Paper','Packing accessories','Packing bags'],
  ['Paper','Packing accessories','Packing paper'],
  ['Plastic','Handling / Pallet accessories','Stacking protection'],
  ['Plastic','Packing accessories','Adhesive tape'],
  ['Plastic','Packing accessories','Flexible packaging (e.g., packing folie, film)'],
  ['Plastic','Packing accessories','Packing marking/identification'],
  ['Plastic','Packing accessories','Packing protection/fillers'],
  ['Plastic','Packing accessories','Special packing materials'],
  ['Plastic','Packing accessories','Strapping'],
  ['Plastic','Pallets','Plastic pallets'],
  ['Wood','Boxes','Chipboard boxes'],
  ['Wood','Boxes','LVL boxes'],
  ['Wood','Boxes','MDF boxes'],
  ['Wood','Boxes','OSB boxes'],
  ['Wood','Boxes','Plywood boxes'],
  ['Wood','Boxes','Solid timber boxes'],
  ['Wood','Cradles','Cradles'],
  ['Wood','Crates','HDF crates'],
  ['Wood','Crates','Plywood crates'],
  ['Wood','Crates','Runner crates'],
  ['Wood','Crates','Slatted crates'],
  ['Wood','Dunnage','Dunnage'],
  ['Wood','Handling / Pallet accessories','Covers'],
  ['Wood','Handling / Pallet accessories','Foldable collars'],
  ['Wood','Handling / Pallet accessories','Lids'],
  ['Wood','Packing accessories','Separators'],
  ['Wood','Packing accessories','Wood wool'],
  ['Wood','Packing accessories','Wooden wedges'],
  ['Wood','Pallets','Compressed pallets'],
  ['Wood','Pallets','International standard pallets'],
  ['Wood','Pallets','PalletBiz standard pallets'],
  ['Wood','Pallets','Special pallets'],
  ['Wood','Production materials','Block wood'],
  ['Wood','Production materials','Chipboards'],
  ['Wood','Production materials','Compressed blocks'],
  ['Wood','Production materials','Cut-to-size pallet elements'],
  ['Wood','Production materials','Fiber boards'],
  ['Wood','Production materials','HDF boards'],
  ['Wood','Production materials','Hardwood boards'],
  ['Wood','Production materials','LVL boards'],
  ['Wood','Production materials','Long-length pallet elements'],
  ['Wood','Production materials','MDF boards'],
  ['Wood','Production materials','OSB boards'],
  ['Wood','Production materials','PSL boards'],
  ['Wood','Production materials','Plywood boards'],
  ['Wood','Production materials','Special timber elements'],
  ['Wood','Racking products','Racking platforms'],
  ['Wood','Raw materials','Log prisms'],
  ['Wood','Raw materials','Long logs'],
  ['Wood','Raw materials','Short logs'],
];

const input    = document.getElementById('search');
const dropdown = document.getElementById('dropdown');
const clearBtn = document.getElementById('clear-btn');
const resultCard = document.getElementById('result-card');
const emptyState = document.getElementById('empty-state');

let activeIdx = -1;
let visibleItems = [];

function hl(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return text;
  return text.slice(0, i) + '<mark>' + text.slice(i, i + q.length) + '</mark>' + text.slice(i + q.length);
}

function openDropdown(items, q) {
  visibleItems = items;
  activeIdx = -1;
  dropdown.innerHTML = '';

  if (!items.length) {
    dropdown.innerHTML = `<div class="dd-no-results">No products match "${q}"</div>`;
    dropdown.classList.add('open');
    input.setAttribute('aria-expanded', 'true');
    return;
  }

  const meta = document.createElement('div');
  meta.className = 'dd-meta';
  meta.textContent = items.length + ' result' + (items.length !== 1 ? 's' : '');
  dropdown.appendChild(meta);

  items.forEach(([mat, cat, prod], idx) => {
    const p = PALETTE[mat] || { base: '#888', light: 'rgba(136,136,136,.12)', text: '#555' };
    const el = document.createElement('div');
    el.className = 'dd-item';
    el.setAttribute('role', 'option');
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="dd-dot" style="background:${p.base}"></div>
      <div class="dd-body">
        <div class="dd-name">${hl(prod, q)}</div>
        <div class="dd-path">
          <span class="dd-pill" style="background:${p.light};color:${p.text}">${mat}</span>
          <span class="sep">›</span>
          <span>${cat}</span>
        </div>
      </div>`;
    el.addEventListener('mousedown', e => { e.preventDefault(); selectItem(idx); });
    el.addEventListener('mouseover', () => setActive(idx));
    dropdown.appendChild(el);
  });

  dropdown.classList.add('open');
  input.setAttribute('aria-expanded', 'true');
}

function closeDropdown() {
  dropdown.classList.remove('open');
  input.setAttribute('aria-expanded', 'false');
  activeIdx = -1;
}

function setActive(idx) {
  const items = dropdown.querySelectorAll('.dd-item');
  items.forEach((el, i) => el.classList.toggle('active', i === idx));
  activeIdx = idx;
}

function selectItem(idx) {
  const row = visibleItems[idx];
  if (!row) return;
  input.value = row[2];
  clearBtn.style.display = 'flex';
  closeDropdown();
  showResult(row);
}

function showResult([mat, cat, prod]) {
  const p = PALETTE[mat] || { base: '#888', light: 'rgba(136,136,136,.12)', text: '#555' };
  resultCard.innerHTML = `
    <div class="rc-header">
      <div class="rc-color-bar" style="background:${p.base}"></div>
      <div>
        <div class="rc-title">${prod}</div>
      </div>
      <div class="rc-tag" style="background:${p.light};color:${p.text}">${mat}</div>
    </div>
    <div class="rc-body">
      <div class="rc-field">
        <div class="rc-label">Material</div>
        <div class="rc-value">
          <span class="mat-swatch" style="background:${p.base}"></span>${mat}
        </div>
      </div>
      <div class="rc-field">
        <div class="rc-label">Category</div>
        <div class="rc-value">${cat}</div>
      </div>
    </div>`;
  resultCard.classList.add('visible');
  emptyState.style.display = 'none';
}

function hideResult() {
  resultCard.classList.remove('visible');
  emptyState.style.display = '';
}

input.addEventListener('input', () => {
  const q = input.value.trim();
  clearBtn.style.display = q ? 'flex' : 'none';
  if (!q) { closeDropdown(); hideResult(); return; }
  const ql = q.toLowerCase();
  const matches = raw.filter(([m, c, p]) =>
    p.toLowerCase().includes(ql) ||
    c.toLowerCase().includes(ql) ||
    m.toLowerCase().includes(ql)
  );
  openDropdown(matches, q);
});

input.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.dd-item');
  if (!dropdown.classList.contains('open')) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    setActive(Math.min(activeIdx + 1, items.length - 1));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    setActive(Math.max(activeIdx - 1, 0));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (activeIdx >= 0) selectItem(activeIdx);
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

input.addEventListener('blur', () => setTimeout(closeDropdown, 150));

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.style.display = 'none';
  closeDropdown();
  hideResult();
  input.focus();
});

document.addEventListener('click', e => {
  if (!document.getElementById('combo').contains(e.target)) closeDropdown();
});
</script>
</body>
</html>
